    overview:'This project investigates how to convert non-digital text into computer-readable text and then into speech through a single end-to-end system. This system captures text with an image input, applies image preprocessing functions to improve readability, uses OCR to extract the text, and finally sends the result to a text-to-speech model for spoken output. This was implemented in MATLAB using the Computer Vision Toolbox for OCR, the Image Processing Toolbox for preprocessing, and Audio Toolbox for speech synthesis. MATLAB’s OCR documentation also notes that recognition performs best when text is clean and located on a uniform background, which supports the decision to emphasize preprocessing as a key part of the workflow.',

const txCtx     = txCanvas.getContext('2d');
const navBtns   = [...document.querySelectorAll('.nav-btn')];

const PANELS = ['mon-panel','chip-panel','sensor-panel','robot-panel']
  .map(id => document.getElementById(id));

let curSec = 0;

function goTo(idx){
  if(idx === curSec) return;
  const fromSec = curSec;
  curSec = idx;
  fireTransition(fromSec, idx);
  showBadge(idx);
  PANELS.forEach((p, i) => {
    if(i === idx){
      p.classList.add('sec-active');
      p.style.animation = 'none';
      requestAnimationFrame(() => { p.style.animation = ''; });
    } else {
      p.classList.remove('sec-active');
    }
  });
  window.scrollTo({top:0, behavior:'instant'});
  navBtns.forEach((b, i) => b.classList.toggle('active', i === idx));
  prog.style.width = (idx / 3 * 100) + '%';
}
window.goTo = goTo;

/* Transition canvas */
let txAnim = null;
const TX_THEMES = [
  {primary:'#00ff88', secondary:'#00d4ff', label:'IMPLEMENTING · MICROCONTROLLER'},
  {primary:'#7c3aed', secondary:'#a78bfa', label:'CALLIBRATING · SENSOR'},
  {primary:'#00d4ff', secondary:'#f97316', label:'DEPLOYING · ROVER'},
  {primary:'#f97316', secondary:'#00d4ff', label:'REPROGRAMMING · MONITOR'},
  {primary:'#a78bfa', secondary:'#7c3aed', label:'RESETTING · MICROCONTROLLER'},
  {primary:'#00d4ff', secondary:'#00ff88', label:'REBOOTING · SENSOR'},
];

function fireTransition(from, to){
  const forward = to > from;
  const thIdx = forward ? (to - 1) : (3 + (from - 1));
  const th = TX_THEMES[Math.min(thIdx, TX_THEMES.length - 1)];
  txCanvas.width = innerWidth; txCanvas.height = innerHeight;
  const pkts = [];
  for(let i = 0; i < 32; i++){
    pkts.push({
      x: Math.random() * innerWidth * (forward ? .5 : 1),
      y: Math.random() * innerHeight,
      spd: (forward ? 1 : -1) * (10 + Math.random() * 20),
      len: 25 + Math.random() * 80,
      byte: Math.floor(Math.random() * 256).toString(16).toUpperCase().padStart(2,'0'),
      alpha: .4 + Math.random() * .6,
      sz: 8 + Math.random() * 5,
      col: Math.random() > .4 ? th.primary : th.secondary,
    });
  }
  let start = null;
  const DUR = 700;
  function frame(ts){
    if(!start) start = ts;
    const t = Math.min((ts - start) / DUR, 1);
    const ca = t < .12 ? t / .12 : t < .72 ? 1 : 1 - (t - .72) / .28;
    txCanvas.style.opacity = ca;
    txCtx.clearRect(0, 0, txCanvas.width, txCanvas.height);
    txCtx.fillStyle = `rgba(4,7,11,${.65 * ca})`;
    txCtx.fillRect(0, 0, txCanvas.width, txCanvas.height);
    pkts.forEach(pk => {
      pk.x += pk.spd;
      if(pk.x > txCanvas.width + 150) pk.x = -pk.len;
      if(pk.x < -pk.len - 150) pk.x = txCanvas.width + 20;
      const g = txCtx.createLinearGradient(pk.x - (forward ? pk.len : -pk.len), pk.y, pk.x, pk.y);
      g.addColorStop(0,'transparent');
      g.addColorStop(1, pk.col + Math.round(pk.alpha * ca * 200).toString(16).padStart(2,'0'));
      txCtx.strokeStyle = g; txCtx.lineWidth = 1.5;
      txCtx.beginPath(); txCtx.moveTo(pk.x - pk.len, pk.y); txCtx.lineTo(pk.x, pk.y); txCtx.stroke();
      txCtx.font = `${pk.sz}px "Space Grotesk",monospace`;
      txCtx.fillStyle = pk.col + Math.round(pk.alpha * ca * 255).toString(16).padStart(2,'0');
      txCtx.fillText('0x' + pk.byte, pk.x + 4, pk.y + 4);
    });
    const sy = (t * txCanvas.height * 1.4) - txCanvas.height * .2;
    const sg = txCtx.createLinearGradient(0, sy - 28, 0, sy + 28);
    sg.addColorStop(0,'transparent'); sg.addColorStop(.5, th.primary + '22'); sg.addColorStop(1,'transparent');
    txCtx.fillStyle = sg; txCtx.fillRect(0, sy - 28, txCanvas.width, 56);
    if(t > .18 && t < .88){
      const la = t < .32 ? (t - .18) / .14 : t < .74 ? 1 : 1 - (t - .74) / .14;
      const clamp = (v,a,b) => Math.min(b, Math.max(a, v));
      txCtx.save();
      txCtx.font = `700 ${clamp(innerWidth / 24, 16, 38)}px "Pilcrow Rounded",sans-serif`;
      txCtx.textAlign = 'center';
      txCtx.fillStyle = `rgba(232,240,233,${la * ca})`;
      txCtx.fillText(th.label, txCanvas.width / 2, txCanvas.height / 2 - 6);
      const tw = txCtx.measureText(th.label).width;
      txCtx.strokeStyle = th.primary + Math.round(la * ca * 160).toString(16).padStart(2,'0');
      txCtx.lineWidth = 1.2;
      txCtx.beginPath();
      txCtx.moveTo(txCanvas.width / 2 - tw / 2, txCanvas.height / 2 + 8);
      txCtx.lineTo(txCanvas.width / 2 + tw / 2, txCanvas.height / 2 + 8);
      txCtx.stroke();
      txCtx.restore();
    }
    if(t < 1) txAnim = requestAnimationFrame(frame);
    else { txCanvas.style.opacity = 0; txAnim = null; }
  }
  if(txAnim) cancelAnimationFrame(txAnim);
  txAnim = requestAnimationFrame(frame);
}

/* Badge */
const BADGE_LABELS = ['Monitor · About','Microcontroller · Projects','Sensor Board · Education','Rover · Contact'];
const BADGE_COLS   = ['var(--color-primary)','var(--color-purple)','var(--color-cyan)','#f97316'];

}

/* Modal */
let lastTrig = null;
function openModal(idx, trig){
  const p = PROJECTS[idx]; if(!p) return;
  lastTrig = trig || document.activeElement;
  document.getElementById('m-title').textContent = p.title;
  document.getElementById('m-role').textContent  = p.role;
  document.getElementById('m-tags').innerHTML    = p.tags.map(t => `<span class="m-tag">${t}</span>`).join('');

  const toList = val => {
    const arr = Array.isArray(val) ? val : String(val).split('\n').filter(Boolean);
    return `<ul>${arr.map(i => {
      const m = i.match(/^([^:]+):\s*(.*)$/);
      return m ? `<li><strong>${m[1]}:</strong> ${m[2]}</li>` : `<li>${i}</li>`;
    }).join('')}</ul>`;
  };

  document.getElementById('m-body').innerHTML = `
      <div>
        <div class="ms-title">Overview</div>
        <div class="ms-text">
          ${p.image ? `<img src="${p.image}" alt="${p.title}" class="m-img-float">` : ''}
          ${p.overview}
        </div>
      </div>
      ${p.takeaways ? `<div><div class="ms-title">Takeaways</div><div class="ms-text">${toList(p.takeaways)}</div></div>` : ''}
      ${p.inspiration ? `<div><div class="ms-title">Inspiration</div><div class="ms-text">${p.inspiration}</div></div>` : ''}
      ${p.goals ? `<div><div class="ms-title">Goals</div><div class="ms-text">${toList(p.goals)}</div></div>` : ''}
      ${p.workflow ? `<div><div class="ms-title">Workflow</div><div class="ms-text">${toList(p.workflow)}</div></div>` : ''}
      ${p.nextSteps ? `<div><div class="ms-title">Next Steps</div><div class="ms-text">${toList(p.nextSteps)}</div></div>` : ''}
      ${p.links && p.links.length ? `<div><div class="ms-title">Links</div><div class="m-links">${p.links.map(l => `<a class="mlink" href="${l.href}" target="_blank" rel="noopener noreferrer">${l.label} →</a>`).join('')}</div></div>` : ''}
      `;

  modalBg.classList.add('open'); modal.classList.add('open'); modal.removeAttribute('hidden');
  document.body.classList.add('modal-open');
  const foc = [...modal.querySelectorAll('a[href],button,[tabindex]:not([tabindex="-1"])')];
  const trap = e => {
    if(e.key !== 'Tab') return;
    if(e.shiftKey){ if(document.activeElement === foc[0]){ e.preventDefault(); foc[foc.length-1].focus(); }}
    else { if(document.activeElement === foc[foc.length-1]){ e.preventDefault(); foc[0].focus(); }}
  };
  modal.addEventListener('keydown', trap); modal._trap = trap;
  requestAnimationFrame(() => closeBtn?.focus());
}
function closeModal(){
  if(!modal.classList.contains('open')) return;
  if(modal._trap){ modal.removeEventListener('keydown', modal._trap); delete modal._trap; }
  modalBg.classList.remove('open'); modal.classList.remove('open');
  document.body.classList.remove('modal-open'); modal.setAttribute('hidden','');
  lastTrig?.focus?.();
}

window.openModal  = openModal;
window.closeModal = closeModal;
modalBg?.addEventListener('click', e => { if(e.target === modalBg) closeModal(); });
closeBtn?.addEventListener('click', closeModal);
document.addEventListener('keydown', e => { if(e.key === 'Escape' && modal.classList.contains('open')) closeModal(); });

/* Starfield */
(()=>{
  const c = document.getElementById('stars');
  const ctx = c?.getContext('2d'); if(!c || !ctx) return;
  let st = [];
  const rsz = () => {
    c.width = innerWidth; c.height = innerHeight;
    st = Array.from({length: 200}, () => ({
      x: Math.random() * c.width, y: Math.random() * c.height,
      r: Math.random() * 1.1 + .2, a: Math.random(), s: Math.random() * .003 + .001
    }));
  };
  rsz(); addEventListener('resize', rsz);
  const draw = () => {
    ctx.clearRect(0, 0, c.width, c.height);
    st.forEach(s => {
      s.a += s.s;
      const o = ((Math.sin(s.a) + 1) / 2) * .5 + .06;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,215,255,${o})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  };
  draw();
})();

/* Sparks */
document.querySelectorAll('.nav-btn').forEach(el => {
  el.addEventListener('click', e => {
    for(let i = 0; i < 7; i++){
      const s = document.createElement('div'); s.className = 'spark';
      const ang = (i / 7) * Math.PI * 2, d = 18 + Math.random() * 22;
      s.style.cssText = [
        `left:${e.clientX}px`, `top:${e.clientY}px`,
        `--dx:${Math.cos(ang)*d}px`, `--dy:${Math.sin(ang)*d}px`,
        `--dur:${(.35 + Math.random() * .3).toFixed(2)}s`,
        'background:var(--color-primary)'
      ].join(';');
      document.body.appendChild(s); setTimeout(() => s.remove(), 700);
    }
  });
});

/* Keyboard nav */
addEventListener('keydown', e => {
  if(modal.classList.contains('open')) return;
  if(e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'j') goTo(Math.min(3, curSec + 1));
  if(e.key === 'ArrowLeft'  || e.key === 'ArrowUp'   || e.key === 'k') goTo(Math.max(0, curSec - 1));
});
